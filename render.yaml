services:
  - type: web
    name: legal-rag-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port 8080
    envVars:
      - key: DATABASE_URL
        scope: project
      - key: LLM_API_KEY
        scope: secret
      - key: LLM_MODEL
        value: gemini-1.5-flash
      - key: EMBEDDING_MODEL
        value: text-embedding-004

  - type: pserv
    name: legal-rag-db
    ipAllowList: []
    plan: free